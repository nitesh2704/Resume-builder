server:
  port: ${PORT:8081}

spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  application:
    name: verdant-ai-resume-builder
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/verdant_resume_builder}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
